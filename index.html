<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ruslan Lesovoy — Multidisciplinary Designer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #000;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .portfolio-btn {
      display: block;
      width: 100%;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .portfolio-btn:active {
      opacity: 0.82;
      transform: scale(0.98);
    }

    .portfolio-btn img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Page 1: Hero / About me -->
    <img class="page-img" src="Page_1.png" alt="Ruslan Lesovoy — Multidisciplinary Designer" />

    <!-- Page 2: Skills -->
    <img class="page-img" src="Page_2.png" alt="Skills" />

    <!-- Page 3: Work Process -->
    <img class="page-img" src="Page_3.png" alt="Work Process" />

    <!-- Page 4: View Portfolio button — click goes to Behance -->
    <a
      class="portfolio-btn"
      href="https://www.behance.net/ruslanlesovoy"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View Portfolio on Behance"
    >
      <img src="Page_4.png" alt="View Portfolio" />
    </a>
  </div>
</body>
</html>
